run_type = "staged_learning"
device = "cpu"  # or "mps"/"cpu" depending on environment
tb_logdir = "../tb_jak2_rl"
json_out_config = "json_jak2_rl.json"

[parameters]
use_checkpoint = false
summary_csv_prefix = "../results/jak2_rl"

prior_file = "priors/reinvent.prior"
agent_file = "../models/jak2_focused.model"

batch_size = 64
unique_sequences = true
randomize_smiles = true
tb_isim = false

[learning_strategy]
type = "dap"
sigma = 128
rate = 0.0001

[diversity_filter]
type = "IdenticalMurckoScaffold"
bucket_size = 25
minscore = 0.4

[inception]
smiles_file = "custom_data/custom_train.smi"
memory_size = 100
sample_size = 10

### Stage 1
[[stage]]
chkpt_file = '../models/jak2_rl_stage1.chkpt'
termination = "simple"
max_score = 1.0
min_steps = 1
max_steps = 300

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 1.0

[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name = "MolecularWeight"
weight = 1.0
transform.type = "double_sigmoid"
transform.high = 550.0
transform.low = 300.0
transform.coef_div = 500.0
transform.coef_si = 20.0
transform.coef_se = 20.0

[[stage.scoring.component]]
[stage.scoring.component.JAK2pIC50]
[[stage.scoring.component.JAK2pIC50.endpoint]]
name = "JAK2pIC50"
weight = 2.0
params.model_path = "../preprocess/run_xgb_v2/xgb_model.ubj"
params.scaler_path = "../preprocess/run_xgb_v2/desc_scaler.pkl"

### Stage 2
[[stage]]
chkpt_file = '../models/jak2_rl_stage2.chkpt'
termination = "simple"
max_score = 1.0
min_steps = 1
max_steps = 500

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 1.0

[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name = "MolecularWeight"
weight = 1.0
transform.type = "double_sigmoid"
transform.high = 550.0
transform.low = 300.0
transform.coef_div = 500.0
transform.coef_si = 20.0
transform.coef_se = 20.0

[[stage.scoring.component]]
[stage.scoring.component.JAK2pIC50]
[[stage.scoring.component.JAK2pIC50.endpoint]]
name = "JAK2pIC50"
weight = 2.0
params.model_path = "../preprocess/run_xgb_v2/xgb_model.ubj"
params.scaler_path = "../preprocess/run_xgb_v2/desc_scaler.pkl"

[[stage.scoring.component]]
[stage.scoring.component.NumRotBond]
[[stage.scoring.component.NumRotBond.endpoint]]
name = "NumRotBond"
weight = 1.0
transform.type = "reverse_sigmoid"
transform.high = 8.0
transform.low = 8.0
transform.k = 0.5

[[stage.scoring.component]]
[stage.scoring.component.TPSA]
[[stage.scoring.component.TPSA.endpoint]]
name = "TPSA"
weight = 1.0
transform.type = "double_sigmoid"
transform.high = 140.0
transform.low = 50.0
transform.coef_div = 140.0
transform.coef_si = 20.0
transform.coef_se = 20.0
