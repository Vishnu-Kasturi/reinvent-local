run_type = "transfer_learning"
device = "cpu"  # or "mps"/"cpu" depending on environment
tb_logdir = "../tb_jak2_tl"
json_out_config = "json_jak2_tl.json"

[parameters]
num_epochs = 100
batch_size = 128
save_every_n_epochs = 10

input_model_file = "priors/reinvent.prior"
smiles_file = "custom_data/custom_train.smi"
validation_smiles_file = "custom_data/custom_val.smi"
output_model_file = "../models/jak2_focused.model"

standardize_smiles = true
randomize_smiles = true
