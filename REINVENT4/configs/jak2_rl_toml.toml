run_type        = "staged_learning"
device          = "cpu"
tb_logdir       = "../tb_jak2_rl_toml"
json_out_config = "json_jak2_rl_toml.json"

[parameters]
use_checkpoint     = false
summary_csv_prefix = "../results/jak2_rl_toml"

# Agent set dynamically by pipeline script
prior_file = "priors/reinvent.prior"
agent_file = "../models/jak2_TL.model.80.chkpt"

batch_size        = 64
unique_sequences  = true
randomize_smiles  = true

[learning_strategy]
type  = "dap"
sigma = 128
rate  = 0.0001

[diversity_filter]
type        = "IdenticalMurckoScaffold"
bucket_size = 8
minscore    = 0.35

[inception]
smiles_file = "../data/jak2_TL_train.smi"
memory_size = 200
sample_size = 20

##############################################################################
# STAGE 1: Broad Optimization (300 steps)
##############################################################################
[[stage]]
chkpt_file  = "../models/jak2_rl_toml_stage1.chkpt"
termination = "simple"
max_score   = 1.0
min_steps   = 50
max_steps   = 300

[stage.scoring]
type = "geometric_mean"

# ── QED ───────────────────────────────────────────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name   = "QED"
weight = 1.0

# ── MolecularWeight ───────────────────────────────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name              = "MolecularWeight"
weight            = 1.0
transform.type    = "double_sigmoid"
transform.low     = 300.0
transform.high    = 550.0
transform.coef_div = 500.0
transform.coef_si = 20.0
transform.coef_se = 20.0

# ── SA Score ──────────────────────────────────────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.SAScore]
[[stage.scoring.component.SAScore.endpoint]]
name              = "SAScore"
weight            = 1.0
transform.type    = "reverse_sigmoid"
transform.high    = 6.0
transform.low     = 2.0
transform.k       = 0.5

# ── JAK2 pIC50: Raw -> Normalized (Sigmoid) ──────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.JAK2pIC50]
[[stage.scoring.component.JAK2pIC50.endpoint]]
name               = "JAK2pIC50"
weight             = 0.0
params.model_path  = "../Preprocess/final_acc/jak2_pic50_final_acc_model.ubj"
params.scaler_path = "../Preprocess/final_acc/jak2_pic50_final_acc_scaler.pkl"
[[stage.scoring.component.JAK2pIC50.endpoint]]
name               = "JAK2pIC50_raw"
weight             = 2.0
transform.type     = "sigmoid"
transform.high     = 10.0
transform.low      = 6.0
transform.k        = 0.5
params.model_path  = "../Preprocess/final_acc/jak2_pic50_final_acc_model.ubj"
params.scaler_path = "../Preprocess/final_acc/jak2_pic50_final_acc_scaler.pkl"


##############################################################################
# STAGE 2: ADMET Refinement (300 steps)
##############################################################################
[[stage]]
chkpt_file  = "../models/jak2_rl_toml_stage2.chkpt"
termination = "simple"
max_score   = 1.0
min_steps   = 50
max_steps   = 300

[stage.scoring]
type = "geometric_mean"

# (Same as Stage 1)
[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name   = "QED"
weight = 1.0

[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name              = "MolecularWeight"
weight            = 1.0
transform.type    = "double_sigmoid"
transform.low     = 300.0
transform.high    = 550.0
transform.coef_div = 500.0
transform.coef_si = 20.0
transform.coef_se = 20.0

[[stage.scoring.component]]
[stage.scoring.component.SAScore]
[[stage.scoring.component.SAScore.endpoint]]
name              = "SAScore"
weight            = 1.0
transform.type    = "reverse_sigmoid"
transform.high    = 6.0
transform.low     = 2.0
transform.k       = 0.5

[[stage.scoring.component]]
[stage.scoring.component.JAK2pIC50]
[[stage.scoring.component.JAK2pIC50.endpoint]]
name               = "JAK2pIC50"
weight             = 0.0
params.model_path  = "../Preprocess/final_acc/jak2_pic50_final_acc_model.ubj"
params.scaler_path = "../Preprocess/final_acc/jak2_pic50_final_acc_scaler.pkl"
[[stage.scoring.component.JAK2pIC50.endpoint]]
name               = "JAK2pIC50_raw"
weight             = 2.0
transform.type     = "sigmoid"
transform.high     = 10.0
transform.low      = 6.0
transform.k        = 0.5
params.model_path  = "../Preprocess/final_acc/jak2_pic50_final_acc_model.ubj"
params.scaler_path = "../Preprocess/final_acc/jak2_pic50_final_acc_scaler.pkl"
