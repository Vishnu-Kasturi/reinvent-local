run_type        = "staged_learning"
device          = "cpu"
tb_logdir       = "../tb_pd1_pdl1_sol_only_rl"
json_out_config = "json_pd1_pdl1_sol_only_rl.json"

[parameters]
use_checkpoint     = false
summary_csv_prefix = "../results/pd1_pdl1_sol_only_rl"

prior_file = "priors/reinvent.prior"
agent_file = "/Users/vishnukasturi/Intern/reinvent-local/models/pd1_pdl1_TL.model.50.chkpt"

batch_size        = 64
unique_sequences  = true
randomize_smiles  = true

[learning_strategy]
type  = "dap"
sigma = 120
rate  = 0.0001

[diversity_filter]
type        = "IdenticalMurckoScaffold"
bucket_size = 50
minscore    = 0.10

[inception]
smiles_file = "../data/pd1_pdl1_TL_train.smi"
memory_size = 200
sample_size = 20

##############################################################################
# SINGLE STAGE — SOLUBILITY FOCUS
# Weight: Sol (3.0), SA (1.0)
##############################################################################
[[stage]]
chkpt_file  = "../models/pd1_pdl1_sol_only_rl.chkpt"
termination = "simple"
max_score   = 1.0
min_steps   = 100
max_steps   = 200

[stage.scoring]
type = "geometric_mean"

# 1. Solubility — High Solubility logS > -1 (Weight 3)
[[stage.scoring.component]]
[stage.scoring.component.PD1PDL1Sol]
[[stage.scoring.component.PD1PDL1Sol.endpoint]]
name               = "PD1PDL1Sol"
weight             = 0.0
params.model_path  = "../Preprocess/final_acc/pd1_pdl1_sol_final_acc_model.ubj"
params.scaler_path = "../Preprocess/final_acc/pd1_pdl1_sol_final_acc_scaler.pkl"
[[stage.scoring.component.PD1PDL1Sol.endpoint]]
name               = "PD1PDL1Sol_raw"
weight             = 3.0
transform.type     = "sigmoid"
transform.low      = -6.0
transform.high     = 0.0
transform.k        = 0.5
params.model_path  = "../Preprocess/final_acc/pd1_pdl1_sol_final_acc_model.ubj"
params.scaler_path = "../Preprocess/final_acc/pd1_pdl1_sol_final_acc_scaler.pkl"

# 2. SA Score — Low Synthesizability difficulty (Weight 1)
[[stage.scoring.component]]
[stage.scoring.component.SAScore]
[[stage.scoring.component.SAScore.endpoint]]
name              = "SAScore"
weight            = 1.0
transform.type    = "reverse_sigmoid"
transform.high    = 5.0
transform.low     = 2.0
transform.k       = 0.5
