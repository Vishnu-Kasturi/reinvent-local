##############################################################################
# jak2_rl_v2.toml  —  Production RL Config for JAK2 pIC50
##############################################################################
#
# ── HOW pIC50 SCORING WORKS (read this before editing) ───────────────────────
#
# The JAK2pIC50 scoring component uses a custom XGBoost model to predict
# pIC50 for each generated SMILES. REINVENT4 requires ALL component scores
# to be in the range [0, 1] — this is mandatory for the geometric_mean
# aggregator to produce meaningful combined rewards.
#
# The plugin (comp_jak2_pic50.py) applies this normalization internally:
#
#   norm_score = (predicted_pIC50 - 3.8) / (10.8 - 3.8)
#   norm_score = clip(norm_score, 0.0, 1.0)
#
# So in the RL output CSV:
#   JAK2pIC50         → normalized score in [0, 1]  (used for training signal)
#   JAK2pIC50_raw     → actual predicted pIC50 in [~4, ~11] (logging only)
#
# DO NOT add a TOML transform to JAK2pIC50 — it would double-transform
# the score and break the reward signal.
#
# The double_sigmoid / reverse_sigmoid transforms you see below are for
# MW, TPSA, NumRotBond only — completely separate from pIC50.
#
##############################################################################

run_type        = "staged_learning"
device          = "cpu"    # change to "cuda:0" if GPU available
tb_logdir       = "../tb_jak2_rl"
json_out_config = "json_jak2_rl_v2.json"

[parameters]
use_checkpoint     = false
summary_csv_prefix = "../results/focused_rl_v2"

# Paths relative to REINVENT4/ directory
prior_file = "priors/reinvent.prior"
agent_file = "../models/jak2_focused.model"

batch_size        = 64
unique_sequences  = true
randomize_smiles  = true
tb_isim           = false

[learning_strategy]
# DAP: Target = Prior_NLL + sigma × score
# sigma=128 → strong gradient per unit of reward
type  = "dap"
sigma = 128
rate  = 0.0001

##############################################################################
# DIVERSITY FILTER
# IdenticalMurckoScaffold: once bucket_size molecules with the same
# Murcko scaffold are accepted, all future molecules of that scaffold → score=0
# bucket_size=8: forces diversity after only 8 hits per scaffold
##############################################################################
[diversity_filter]
type        = "IdenticalMurckoScaffold"
bucket_size = 8
minscore    = 0.35

##############################################################################
# INCEPTION MEMORY
# Seeds the experience replay buffer with known active ligands.
##############################################################################
[inception]
smiles_file = "../data/custom_train.smi"
memory_size = 200
sample_size = 20

##############################################################################
# STAGE 1: Broad JAK2 pIC50 Optimization (300 steps)
# Components: QED + MolecularWeight + JAK2pIC50
##############################################################################
[[stage]]
chkpt_file  = "../models/jak2_rl_stage1_v2.chkpt"
termination = "simple"
max_score   = 1.0
min_steps   = 50
max_steps   = 300

[stage.scoring]
type = "geometric_mean"

# ── QED: Drug-likeness (already [0,1]) ────────────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name   = "QED"
weight = 1.0

# ── MolecularWeight: Lipinski-compliant range [300, 550] ──────────────────────
[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name              = "MolecularWeight"
weight            = 1.0
transform.type    = "double_sigmoid"
transform.low     = 300.0
transform.high    = 550.0
transform.coef_div = 500.0
transform.coef_si = 20.0
transform.coef_se = 20.0

# ── JAK2 pIC50 ────────────────────────────────────────────────────────────────
# The XGBoost model predicts raw pIC50 in [~4, ~11]. The plugin normalizes
# it to [0, 1] internally. DO NOT add a transform here.
# weight=2.0 → 2x gradient toward potency vs other components.
# JAK2pIC50_raw endpoint (weight=0) logs the actual pIC50 in the CSV only.
[[stage.scoring.component]]
[stage.scoring.component.JAK2pIC50]
[[stage.scoring.component.JAK2pIC50.endpoint]]
name               = "JAK2pIC50"
weight             = 2.0
params.model_path  = "../data/xgb_model.ubj"
params.scaler_path = "../data/desc_scaler.pkl"
[[stage.scoring.component.JAK2pIC50.endpoint]]
name               = "JAK2pIC50_raw"
weight             = 0.0
params.model_path  = "../data/xgb_model.ubj"
params.scaler_path = "../data/desc_scaler.pkl"

##############################################################################
# STAGE 2: ADMET-Constrained Refinement (500 steps)
# Components: QED + MW + JAK2pIC50 + NumRotBond + TPSA
##############################################################################
[[stage]]
chkpt_file  = "../models/jak2_rl_stage2_v2.chkpt"
termination = "simple"
max_score   = 1.0
min_steps   = 50
max_steps   = 500

[stage.scoring]
type = "geometric_mean"

# ── QED ───────────────────────────────────────────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name   = "QED"
weight = 1.0

# ── MolecularWeight ───────────────────────────────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.MolecularWeight]
[[stage.scoring.component.MolecularWeight.endpoint]]
name              = "MolecularWeight"
weight            = 1.0
transform.type    = "double_sigmoid"
transform.low     = 300.0
transform.high    = 550.0
transform.coef_div = 500.0
transform.coef_si = 20.0
transform.coef_se = 20.0

# ── JAK2 pIC50 ────────────────────────────────────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.JAK2pIC50]
[[stage.scoring.component.JAK2pIC50.endpoint]]
name               = "JAK2pIC50"
weight             = 2.0
params.model_path  = "../data/xgb_model.ubj"
params.scaler_path = "../data/desc_scaler.pkl"
[[stage.scoring.component.JAK2pIC50.endpoint]]
name               = "JAK2pIC50_raw"
weight             = 0.0
params.model_path  = "../data/xgb_model.ubj"
params.scaler_path = "../data/desc_scaler.pkl"

# ── NumRotatableBonds: reverse_sigmoid [2, 10] ────────────────────────────────
# Score: x<=6 → ~0.98 (ideal), x=10 → 0.50, x>=12 → penalized
[[stage.scoring.component]]
[stage.scoring.component.NumRotBond]
[[stage.scoring.component.NumRotBond.endpoint]]
name             = "NumRotBond"
weight           = 1.0
transform.type   = "reverse_sigmoid"
transform.high   = 10.0
transform.low    = 2.0
transform.k      = 20.0

# ── TPSA: Target range 50–130 Å² ──────────────────────────────────────────────
[[stage.scoring.component]]
[stage.scoring.component.TPSA]
[[stage.scoring.component.TPSA.endpoint]]
name              = "TPSA"
weight            = 1.0
transform.type    = "double_sigmoid"
transform.low     = 50.0
transform.high    = 130.0
transform.coef_div = 150.0
transform.coef_si = 20.0
transform.coef_se = 20.0
